<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<title>Pir Ahmed Shah | Dev Blog</title>
		<meta name="title" content="Pir Ahmed Shah | Dev Blog" />
		<meta
			name="description"
			content="Engineering logs, Svelte 5 deep dives, and CS fundamentals from a 4th-sem student at FAST-NUCES."
		/>

		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://pirahmedshah.github.io/blog" />
		<meta property="og:title" content="Pir Ahmed Shah | Dev Blog" />
		<meta
			property="og:description"
			content="Documenting the build of RoDevsy and the 4th-semester grind."
		/>
		<meta property="og:image" content="%sveltekit.assets%/og-image.png" />

		<meta property="twitter:card" content="summary_large_image" />
		<meta property="twitter:title" content="Pir Ahmed Shah | Dev Blog" />
		<meta property="twitter:description" content="Engineering logs and Svelte 5 explorations." />

		<script>
			(function () {
				try {
					const saved = localStorage.getItem('theme');
					const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
					const theme = saved || (systemDark ? 'dark' : 'light');
					document.documentElement.setAttribute('data-theme', theme);
				} catch (e) {
					document.documentElement.setAttribute('data-theme', 'light');
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="antialiased selection:bg-primary/30">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
